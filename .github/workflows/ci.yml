name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e . pytest
      - run: pytest -q
      # offline mode keeps CI hermetic (no live OSV/EPSS/KEV calls)
      - run: sbomrisk examples/sbom.cyclonedx.json --offline examples/offline_fixture.json
